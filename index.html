<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coffee Story</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: black;
    }

    /* HERO VIDEO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      top: 40%;
      transform: translateY(-50%);
    }

    .hero h1 {
      font-size: 48px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    /* SECTIONS */
    section {
      padding: 80px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* SERVICES */
    .services {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #111;
      padding: 20px;
      flex: 1;
      min-width: 250px;
    }

    /* PRICING */
    .pricing {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .price-card {
      background: #111;
      padding: 20px;
      flex: 1;
      min-width: 250px;
      border: 1px solid #333;
    }

    /* FORM */
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
    }

    button {
      padding: 12px;
      width: 100%;
      background: white;
      border: none;
      font-weight: bold;
    }

  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <video autoplay muted loop>
    <source src="Omar%20video.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>We tell coffee stories</h1>
    <p>Like a documentary for your brand</p>
    <a href="#pricing" class="btn">View Pricing</a>
  </div>
</div>

<!-- ABOUT -->
<section>
  <h2>About</h2>
  <p>I create cinematic content for coffee brands that want to stand out.</p>
</section>

<!-- SERVICES -->
<section>
  <h2>Services</h2>
  <div class="services">
    <div class="card">Product Photography</div>
    <div class="card">Brand Storytelling</div>
    <div class="card">Social Media Content</div>
  </div>
</section>

<!-- PRICING -->
<section id="pricing">
  <h2>Pricing</h2>

  <div class="pricing">
    <div class="price-card">
      <h3>Signature</h3>
      <p>$2,500+</p>
    </div>

    <div class="price-card">
      <h3>Premium</h3>
      <p>$4,500+</p>
    </div>

    <div class="price-card">
      <h3>Partner</h3>
      <p>$8,000+</p>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section>
  <h2>Contact</h2>

  <input placeholder="Your Name">
  <input placeholder="Your Email">
  <textarea placeholder="Tell me about your project"></textarea>
  <button>Send</button>
</section>

</body>
</html>
