<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLINDSIP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --orange: #ef7833;
  --black: #000;
  --white: #fff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: var(--black);
  color: var(--white);
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

/* DARK OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
}

/* CENTER CONTENT */
.hero-content {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* 🔥 LOGO (FIXED + VISIBLE EFFECT) */
.logo {
  width: 140px;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
  mix-blend-mode: multiply; /* 🔥 սա ջնջում է սպիտակ ֆոնը */
}

/* FLOAT ANIMATION */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* TEXT */
.hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.hero p {
  color: rgba(255,255,255,0.8);
  margin-bottom: 20px;
}

/* BUTTON */
.btn {
  background: var(--orange);
  color: white;
  padding: 14px 28px;
  text-decoration: none;
  border-radius: 8px;
}

/* SECTION */
section {
  padding: 80px 20px;
  .cta {
  text-align: center;
}

.cta .btn {
  display: inline-block;
  margin-top: 20px;
}

/* STATS */
.stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  font-size: 14px;
  opacity: 0.8;
}

/* VIDEOS */
.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}

.video-grid video {
  height: 220px;
  object-fit: cover;
}

/* MOBILE */
@media (max-width: 768px) {
  .video-grid {
    grid-template-columns: 1fr;
  }

  .stats {
    flex-direction: column;
  }

  .hero h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <video autoplay muted loop playsinline>
    <source src="Omar%20video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-content">
    <img src="logo.png" class="logo">

    <h1>Get Your Coffee Shop Featured</h1>
    <p>We create cinematic stories that bring your brand to life</p>

    <a href="#" class="btn">Get Featured</a>
  </div>
</div>

<!-- SOCIAL -->
<section class="stats">
  <div>50+ Coffee Shops Featured</div>
  <div>Interviews • Competitions • Stories</div>
  <div>Growing Audience</div>
</section>

<!-- VIDEOS -->
<section>
  <h2>Featured Stories</h2>

  <div class="video-grid">
    <video src="Omar%20video.mp4" autoplay muted loop></video>
    <video src="Omar%20video.mp4" autoplay muted loop></video>
    <video src="Omar%20video.mp4" autoplay muted loop></video>
  </div>
</section>

<!-- CTA -->
<section>
  <h2>Want to be featured?</h2>
  <a href="#" class="btn">Contact Us</a>
</section>

</body>
</html>
