<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<title>BlindSip</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#000;color:#fff;overflow-x:hidden;}

.hero{position:relative;height:100vh;}
.hero video{
  width:100%;
  height:100%;
  object-fit:cover;
  filter: blur(6px) brightness(0.5);
}
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
}
.hero-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}
.hero h1{font-size:40px;}
.hero p{opacity:0.85;margin-top:8px;}
.btn{
  margin-top:15px;
  background:#ff6b00;
  padding:10px 22px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.section{padding:90px 10%;text-align:center;}

form{
  max-width:400px;
  margin:30px auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}
input,textarea{
  padding:12px;
  border:none;
  border-radius:8px;
}
button{
  background:#ff6b00;
  padding:12px;
  border:none;
  border-radius:8px;
  color:#fff;
}

.fade{opacity:0;transform:translateY(50px);transition:1s;}
.fade.show{opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="https://raw.githubusercontent.com/Lusine-Luchok/coffee-landing-page/main/Omar%20video.mp4">
  </video>
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Get Your Coffee Shop Featured</h1>
    <p>Blindfolded coffee experience</p>
    <div class="btn">Apply Now</div>
  </div>
</section>

<section class="section fade">
  <div>50+ Coffee Shops Featured</div>
</section>

<section class="section fade">
  <h2>Apply Now</h2>

  <form id="contact-form">
    <input name="name" placeholder="Coffee Shop Name" required>
    <input name="email" type="email" placeholder="Email" required>
    <textarea name="message" placeholder="Tell us about your shop"></textarea>
    <button type="submit">Submit</button>
  </form>

  <p id="success-message" style="display:none;color:#ff6b00;">
    ✅ Your request has been sent! Check your email 📩
  </p>
</section>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("rdTdjQHUaRYwjvoeg");
})();

document.getElementById("contact-form").addEventListener("submit", function(e){
  e.preventDefault();

  emailjs.sendForm("service_ruav9pj", "template_dtczh63", this)
  .then(function(){
    document.getElementById("success-message").style.display = "block";
    document.getElementById("contact-form").reset();
  }, function(error){
    alert("Error: " + JSON.stringify(error));
  });
});
</script>

<script>
document.querySelector('.btn').addEventListener('click', () => {
  document.querySelector('#contact-form').scrollIntoView({ behavior: 'smooth' });
});

const fades=document.querySelectorAll('.fade');

window.addEventListener('scroll',()=>{
  fades.forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight-100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
